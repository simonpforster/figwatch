name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t figwatch:ci .

      - name: Smoke test — health endpoint
        run: |
          docker run -d --name figwatch-ci \
            -e FIGMA_PAT=figd_placeholder \
            -e FIGWATCH_WEBHOOK_PASSCODE=placeholder \
            -p 8080:8080 \
            figwatch:ci
          sleep 5
          curl -sf http://localhost:8080/health
          docker rm -f figwatch-ci

  macos:
    name: macOS app build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: make install

      - name: Build app
        run: make build

      - name: Verify app bundle exists
        run: test -d macos/dist/FigWatch.app

  publish:
    name: Publish image
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
