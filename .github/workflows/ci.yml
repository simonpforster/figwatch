name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,server]"

      - name: Run tests
        run: pytest

      - name: Verify server imports
        run: python -c "from figwatch.metrics import init_metrics; from figwatch.webhook_monitor import WebhookMonitor; print('ok')"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: figwatch:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — health endpoint
        run: |
          docker run -d --name figwatch-ci \
            -e FIGMA_PAT=figd_placeholder \
            -e FIGWATCH_WEBHOOK_PASSCODE=placeholder \
            -p 8080:8080 \
            figwatch:ci
          sleep 5
          curl -sf http://localhost:8080/health
          docker rm -f figwatch-ci

  macos:
    name: macOS app build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: make install

      - name: Build app
        run: make build

      - name: Verify app bundle exists
        run: test -d macos/dist/FigWatch.app

      - name: Upload app bundle
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: FigWatch.app
          path: macos/dist/FigWatch.app
          retention-days: 1

  check-version:
    name: Check version
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      is_new: ${{ steps.check.outputs.is_new }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          CURRENT=$(python -c 'from figwatch import __version__; print(__version__)')
          PREVIOUS=$(git show HEAD~1:figwatch/__init__.py 2>/dev/null | grep -oP '(?<=__version__ = ")[^"]+' || echo "")
          echo "version=$CURRENT" >> $GITHUB_OUTPUT
          echo "is_new=$([ "$CURRENT" != "$PREVIOUS" ] && echo true || echo false)" >> $GITHUB_OUTPUT

  publish:
    name: Publish image
    runs-on: ubuntu-latest
    needs: [test, docker, check-version]
    # check-version is skipped on PRs; allow publish to proceed when its
    # needed jobs either succeeded or were intentionally skipped.
    if: |
      !cancelled() &&
      needs.test.result == 'success' &&
      needs.docker.result == 'success' &&
      (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push — new version (main)
        if: github.event_name == 'push' && needs.check-version.outputs.is_new == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ needs.check-version.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — same version (main)
        if: github.event_name == 'push' && needs.check-version.outputs.is_new == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release macOS app
    runs-on: ubuntu-latest
    needs: [check-version, macos, test]
    if: github.event_name == 'push' && needs.check-version.outputs.is_new == 'true'
    permissions:
      contents: write
    steps:
      - name: Download app bundle
        uses: actions/download-artifact@v4
        with:
          name: FigWatch.app
          path: FigWatch.app

      - name: Zip app bundle
        run: zip -r FigWatch.zip FigWatch.app

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: FigWatch v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: FigWatch.zip
