services:
  figwatch:
    build: .
    ports:
      - "${FIGWATCH_PORT:-8080}:${FIGWATCH_PORT:-8080}"
    environment:
      # Required
      - FIGMA_PAT=${FIGMA_PAT}
      - FIGWATCH_WEBHOOK_PASSCODE=${FIGWATCH_WEBHOOK_PASSCODE}
      # AI provider — set one (or both if you switch models)
      - ANTHROPIC_API_KEY
      - GOOGLE_API_KEY
      # Optional — omit from .env to use application defaults
      - FIGWATCH_MODEL
      - FIGWATCH_FILES
      - FIGWATCH_LOCALE
      - FIGWATCH_PORT
      - FIGWATCH_WORKERS
      # Webhook health monitoring
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - FIGWATCH_TEAM_ID
      - FIGWATCH_MONITOR_TICK
      - FIGWATCH_MONITOR_GRACE
      - FIGWATCH_MONITOR_FILE_REFRESH
      - FIGWATCH_MONITOR_RPM
    volumes:
      # Optional: mount custom skill files
      - ./custom-skills:/app/custom-skills
    restart: unless-stopped
