<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif">
  <rect width="1400" height="900" fill="#FAFAFA"/>

  <text x="60" y="60" font-size="22" font-weight="600" fill="#1F1F1F">Admin dashboard · 管理后台</text>
  <text x="60" y="86" font-size="14" fill="#6B6B6B">Skill usage + performance for design ops — retire, promote, budget</text>

  <!-- app chrome -->
  <rect x="60" y="120" width="1280" height="720" rx="12" fill="#FFFFFF" stroke="#1F1F1F" stroke-width="1.5"/>

  <!-- header bar -->
  <rect x="60" y="120" width="1280" height="56" rx="12" fill="#1F1F1F"/>
  <text x="90" y="155" font-size="14" font-weight="600" fill="#FFFFFF">FigWatch · Server</text>
  <text x="260" y="155" font-size="12" fill="#BFBFBF">Overview · Skills · Audits · Billing · Settings</text>
  <rect x="1180" y="134" width="130" height="28" rx="14" fill="#2F2F2F"/>
  <text x="1245" y="153" text-anchor="middle" font-size="11" fill="#FFFFFF">Last 7 days ▾</text>

  <!-- KPI cards -->
  <g>
    <rect x="90" y="200" width="290" height="100" rx="8" fill="#FAFAFA" stroke="#EAEAEA"/>
    <text x="110" y="226" font-size="11" fill="#8A8A8A">Audits (7d)  /  7 日审查数</text>
    <text x="110" y="268" font-size="28" font-weight="600" fill="#1F1F1F">2,418</text>
    <text x="110" y="290" font-size="11" fill="#2E8540">▲ 18% vs previous week</text>

    <rect x="400" y="200" width="290" height="100" rx="8" fill="#FAFAFA" stroke="#EAEAEA"/>
    <text x="420" y="226" font-size="11" fill="#8A8A8A">Median audit time  /  耗时中位数</text>
    <text x="420" y="268" font-size="28" font-weight="600" fill="#1F1F1F">14.2s</text>
    <text x="420" y="290" font-size="11" fill="#2E8540">▼ 1.3s faster</text>

    <rect x="710" y="200" width="290" height="100" rx="8" fill="#FAFAFA" stroke="#EAEAEA"/>
    <text x="730" y="226" font-size="11" fill="#8A8A8A">Success rate  /  成功率</text>
    <text x="730" y="268" font-size="28" font-weight="600" fill="#1F1F1F">96.4%</text>
    <text x="730" y="290" font-size="11" fill="#8A8A8A">86 retries · 3 failed</text>

    <rect x="1020" y="200" width="290" height="100" rx="8" fill="#FAFAFA" stroke="#EAEAEA"/>
    <text x="1040" y="226" font-size="11" fill="#8A8A8A">Provider cost  /  Provider 成本</text>
    <text x="1040" y="268" font-size="28" font-weight="600" fill="#1F1F1F">$ 48.21</text>
    <text x="1040" y="290" font-size="11" fill="#8A8A8A">Claude 74% · Gemini 26%</text>
  </g>

  <!-- LEFT chart: skill usage bar -->
  <g transform="translate(90, 330)">
    <text x="0" y="18" font-size="13" font-weight="600" fill="#1F1F1F">Skill usage · 技能使用分布</text>
    <text x="0" y="34" font-size="10" fill="#8A8A8A">calls this week, sorted by volume</text>

    <!-- axis -->
    <line x1="140" y1="58" x2="140" y2="340" stroke="#D0D0D0"/>

    <!-- bars -->
    <g font-size="11" fill="#1F1F1F">
      <text x="130" y="80" text-anchor="end">@tone</text>
      <rect x="140" y="64" width="420" height="26" fill="#1F1F1F"/>
      <text x="570" y="82" font-size="11" fill="#6B6B6B">1,184</text>

      <text x="130" y="116" text-anchor="end">@ux</text>
      <rect x="140" y="100" width="320" height="26" fill="#1F1F1F"/>
      <text x="470" y="118" font-size="11" fill="#6B6B6B">902</text>

      <text x="130" y="152" text-anchor="end">@a11y</text>
      <rect x="140" y="136" width="110" height="26" fill="#1F1F1F"/>
      <text x="260" y="154" font-size="11" fill="#6B6B6B">238</text>

      <text x="130" y="188" text-anchor="end">@copy-length</text>
      <rect x="140" y="172" width="48" height="26" fill="#1F1F1F"/>
      <text x="198" y="190" font-size="11" fill="#6B6B6B">86</text>

      <text x="130" y="224" text-anchor="end">@i18n</text>
      <rect x="140" y="208" width="14" height="26" fill="#8A8A8A"/>
      <text x="164" y="226" font-size="11" fill="#C0392B">8 · 50% retry ⚠</text>
    </g>
  </g>

  <!-- RIGHT chart: audit duration over time -->
  <g transform="translate(720, 330)">
    <text x="0" y="18" font-size="13" font-weight="600" fill="#1F1F1F">Audit time P50 / P95 · 审查耗时</text>
    <text x="0" y="34" font-size="10" fill="#8A8A8A">last 7 days (seconds)</text>

    <!-- axes -->
    <line x1="40" y1="58" x2="40" y2="320" stroke="#D0D0D0"/>
    <line x1="40" y1="320" x2="600" y2="320" stroke="#D0D0D0"/>
    <text x="30" y="72" text-anchor="end" font-size="9" fill="#8A8A8A">30s</text>
    <text x="30" y="196" text-anchor="end" font-size="9" fill="#8A8A8A">15s</text>
    <text x="30" y="320" text-anchor="end" font-size="9" fill="#8A8A8A">0s</text>

    <!-- P95 line (lighter) -->
    <polyline fill="none" stroke="#8A8A8A" stroke-width="1.5" stroke-dasharray="4 3"
      points="60,150 140,170 220,140 300,155 380,138 460,152 540,132"/>
    <!-- P50 line (solid) -->
    <polyline fill="none" stroke="#1F1F1F" stroke-width="2"
      points="60,216 140,226 220,208 300,220 380,204 460,214 540,196"/>

    <!-- dots -->
    <g fill="#1F1F1F">
      <circle cx="60" cy="216" r="3"/>
      <circle cx="140" cy="226" r="3"/>
      <circle cx="220" cy="208" r="3"/>
      <circle cx="300" cy="220" r="3"/>
      <circle cx="380" cy="204" r="3"/>
      <circle cx="460" cy="214" r="3"/>
      <circle cx="540" cy="196" r="3"/>
    </g>

    <text x="60" y="338" font-size="9" fill="#8A8A8A">Mon</text>
    <text x="140" y="338" font-size="9" fill="#8A8A8A">Tue</text>
    <text x="220" y="338" font-size="9" fill="#8A8A8A">Wed</text>
    <text x="300" y="338" font-size="9" fill="#8A8A8A">Thu</text>
    <text x="380" y="338" font-size="9" fill="#8A8A8A">Fri</text>
    <text x="460" y="338" font-size="9" fill="#8A8A8A">Sat</text>
    <text x="540" y="338" font-size="9" fill="#8A8A8A">Sun</text>

    <!-- legend -->
    <line x1="440" y1="58" x2="460" y2="58" stroke="#1F1F1F" stroke-width="2"/>
    <text x="466" y="62" font-size="10" fill="#1F1F1F">P50</text>
    <line x1="500" y1="58" x2="520" y2="58" stroke="#8A8A8A" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="526" y="62" font-size="10" fill="#8A8A8A">P95</text>
  </g>

  <!-- Bottom table: skills ROI -->
  <g transform="translate(90, 690)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#1F1F1F">Skills · ROI view</text>
    <text x="130" y="0" font-size="11" fill="#6B6B6B">sort: usage ▾</text>

    <!-- table header -->
    <rect x="0" y="14" width="1220" height="28" fill="#F0EDE6"/>
    <g font-size="11" font-weight="600" fill="#1F1F1F">
      <text x="16" y="32">Skill</text>
      <text x="180" y="32">Source</text>
      <text x="340" y="32">Calls</text>
      <text x="440" y="32">Success</text>
      <text x="560" y="32">Median</text>
      <text x="680" y="32">P95</text>
      <text x="800" y="32">Cost</text>
      <text x="920" y="32">Top user</text>
      <text x="1100" y="32">Status</text>
    </g>
    <!-- rows -->
    <g font-size="11" fill="#1F1F1F">
      <line x1="0" y1="42" x2="1220" y2="42" stroke="#EAEAEA"/>
      <text x="16" y="60">@tone</text>
      <text x="180" y="60" fill="#6B6B6B">built-in</text>
      <text x="340" y="60">1,184</text>
      <text x="440" y="60" fill="#2E8540">98.2%</text>
      <text x="560" y="60">12.8s</text>
      <text x="680" y="60">19.1s</text>
      <text x="800" y="60">$ 21.40</text>
      <text x="920" y="60" fill="#6B6B6B">Alex M.</text>
      <rect x="1100" y="48" width="60" height="18" rx="3" fill="#2E8540"/>
      <text x="1130" y="61" text-anchor="middle" font-size="10" fill="#FFFFFF">promote</text>

      <line x1="0" y1="72" x2="1220" y2="72" stroke="#EAEAEA"/>
      <text x="16" y="90">@ux</text>
      <text x="180" y="90" fill="#6B6B6B">built-in</text>
      <text x="340" y="90">902</text>
      <text x="440" y="90" fill="#2E8540">96.7%</text>
      <text x="560" y="90">14.4s</text>
      <text x="680" y="90">22.8s</text>
      <text x="800" y="90">$ 17.05</text>
      <text x="920" y="90" fill="#6B6B6B">Bea K.</text>
      <rect x="1100" y="78" width="60" height="18" rx="3" fill="#2E8540"/>
      <text x="1130" y="91" text-anchor="middle" font-size="10" fill="#FFFFFF">promote</text>

      <line x1="0" y1="102" x2="1220" y2="102" stroke="#EAEAEA"/>
      <text x="16" y="120">@a11y</text>
      <text x="180" y="120" fill="#6B6B6B">team</text>
      <text x="340" y="120">238</text>
      <text x="440" y="120" fill="#2E8540">94.1%</text>
      <text x="560" y="120">16.1s</text>
      <text x="680" y="120">24.3s</text>
      <text x="800" y="120">$ 6.82</text>
      <text x="920" y="120" fill="#6B6B6B">Priya R.</text>
      <rect x="1100" y="108" width="60" height="18" rx="3" fill="#1F1F1F"/>
      <text x="1130" y="121" text-anchor="middle" font-size="10" fill="#FFFFFF">keep</text>

      <line x1="0" y1="132" x2="1220" y2="132" stroke="#EAEAEA"/>
      <text x="16" y="150">@i18n</text>
      <text x="180" y="150" fill="#6B6B6B">personal</text>
      <text x="340" y="150">8</text>
      <text x="440" y="150" fill="#C0392B">50.0%</text>
      <text x="560" y="150">22.7s</text>
      <text x="680" y="150">41.0s</text>
      <text x="800" y="150">$ 0.58</text>
      <text x="920" y="150" fill="#6B6B6B">Jonas L.</text>
      <rect x="1100" y="138" width="60" height="18" rx="3" fill="#C0392B"/>
      <text x="1130" y="151" text-anchor="middle" font-size="10" fill="#FFFFFF">retire</text>
    </g>
  </g>
</svg>
