<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'WenQuanYi Zen Hei', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F1F1F"/>
    </marker>
    <marker id="arrMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B0B0B0"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#FAFAFA"/>

  <text x="60" y="60" font-size="22" font-weight="600" fill="#1F1F1F">Zero context switch · 零上下文切换</text>
  <text x="60" y="86" font-size="14" fill="#6B6B6B">The review loop collapses from many tools into one surface.</text>

  <!-- ===== LEFT: Before ===== -->
  <g>
    <text x="110" y="156" font-size="12" font-weight="600" fill="#8A8A8A" letter-spacing="1.5">BEFORE · 之前</text>
    <text x="110" y="176" font-size="11" fill="#8A8A8A">the review scatters across 4–5 surfaces</text>
    <text x="110" y="192" font-size="11" fill="#8A8A8A">审查分散在 4–5 个工具之间</text>

    <!-- center: designer -->
    <circle cx="290" cy="420" r="38" fill="#FFFFFF" stroke="#1F1F1F" stroke-width="1.5"/>
    <text x="290" y="415" text-anchor="middle" font-size="11" font-weight="600" fill="#1F1F1F">designer</text>
    <text x="290" y="431" text-anchor="middle" font-size="11" fill="#6B6B6B">设计师</text>

    <!-- scattered tools -->
    <g>
      <rect x="110" y="240" width="120" height="44" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1"/>
      <text x="170" y="266" text-anchor="middle" font-size="11" fill="#6B6B6B">Figma</text>

      <rect x="350" y="240" width="120" height="44" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1"/>
      <text x="410" y="266" text-anchor="middle" font-size="11" fill="#6B6B6B">Tone of Voice doc</text>

      <rect x="470" y="400" width="120" height="44" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1"/>
      <text x="530" y="426" text-anchor="middle" font-size="11" fill="#6B6B6B">Heuristics PDF</text>

      <rect x="110" y="560" width="120" height="44" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1"/>
      <text x="170" y="586" text-anchor="middle" font-size="11" fill="#6B6B6B">ChatGPT</text>

      <rect x="350" y="560" width="120" height="44" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1"/>
      <text x="410" y="586" text-anchor="middle" font-size="11" fill="#6B6B6B">Slack</text>
    </g>

    <!-- tangled arrows out + back -->
    <g stroke="#B0B0B0" stroke-width="1" fill="none" marker-end="url(#arrMuted)">
      <path d="M 258 392 C 210 330, 180 290, 170 284"/>
      <path d="M 322 392 C 370 330, 400 290, 410 284"/>
      <path d="M 328 420 L 470 420"/>
      <path d="M 258 448 C 210 500, 180 540, 170 560"/>
      <path d="M 322 448 C 370 500, 400 540, 410 560"/>
    </g>
    <g stroke="#B0B0B0" stroke-width="1" fill="none" marker-end="url(#arrMuted)">
      <path d="M 170 284 C 200 350, 240 390, 256 400"/>
      <path d="M 410 284 C 380 350, 340 390, 324 400"/>
      <path d="M 470 420 L 336 420"/>
      <path d="M 170 560 C 200 500, 240 460, 256 444"/>
      <path d="M 410 560 C 380 500, 340 460, 324 444"/>
    </g>

    <text x="310" y="650" text-anchor="middle" font-size="11" fill="#8A8A8A" font-style="italic">30–120 s / frame · context lost each hop</text>
  </g>

  <!-- divider -->
  <line x1="600" y1="200" x2="600" y2="620" stroke="#EAEAEA" stroke-dasharray="4 4"/>

  <!-- ===== RIGHT: After ===== -->
  <g>
    <text x="650" y="156" font-size="12" font-weight="600" fill="#1F1F1F" letter-spacing="1.5">AFTER · 之后</text>
    <text x="650" y="176" font-size="11" fill="#6B6B6B">the review collapses into one surface</text>
    <text x="650" y="192" font-size="11" fill="#6B6B6B">审查坍缩到一个界面里</text>

    <!-- designer -->
    <circle cx="760" cy="420" r="38" fill="#FFFFFF" stroke="#1F1F1F" stroke-width="1.5"/>
    <text x="760" y="415" text-anchor="middle" font-size="11" font-weight="600" fill="#1F1F1F">designer</text>
    <text x="760" y="431" text-anchor="middle" font-size="11" fill="#6B6B6B">设计师</text>

    <!-- single surface -->
    <rect x="900" y="336" width="220" height="172" rx="12" fill="#F0EDE6" stroke="#1F1F1F" stroke-width="2"/>
    <text x="1010" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1F">Figma</text>
    <text x="1010" y="390" text-anchor="middle" font-size="11" fill="#6B6B6B">the comment thread</text>
    <text x="1010" y="408" text-anchor="middle" font-size="11" fill="#6B6B6B">一条评论线程</text>
    <!-- small badge: FigWatch lives here -->
    <rect x="925" y="430" width="170" height="26" rx="13" fill="#1F1F1F"/>
    <text x="1010" y="447" text-anchor="middle" font-size="11" fill="#FFFFFF">FigWatch lives here</text>
    <text x="1010" y="478" text-anchor="middle" font-size="10" fill="#8A8A8A">FigWatch 就在这里</text>

    <!-- tight loop arrows -->
    <path d="M 798 408 C 850 388, 880 376, 900 376" fill="none" stroke="#1F1F1F" stroke-width="1.8" marker-end="url(#arr)"/>
    <path d="M 900 464 C 880 464, 850 452, 798 432" fill="none" stroke="#1F1F1F" stroke-width="1.8" marker-end="url(#arr)"/>
    <text x="849" y="362" font-size="11" fill="#1F1F1F" font-style="italic">trigger</text>
    <text x="849" y="490" font-size="11" fill="#1F1F1F" font-style="italic">reply</text>

    <!-- crossed-out secondary tools (faint) -->
    <g opacity="0.35">
      <rect x="650" y="260" width="90" height="32" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1"/>
      <text x="695" y="280" text-anchor="middle" font-size="10" fill="#6B6B6B">Notion</text>
      <line x1="650" y1="260" x2="740" y2="292" stroke="#B0B0B0" stroke-width="1"/>

      <rect x="760" y="260" width="90" height="32" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1"/>
      <text x="805" y="280" text-anchor="middle" font-size="10" fill="#6B6B6B">Slack</text>
      <line x1="760" y1="260" x2="850" y2="292" stroke="#B0B0B0" stroke-width="1"/>

      <rect x="650" y="558" width="90" height="32" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1"/>
      <text x="695" y="578" text-anchor="middle" font-size="10" fill="#6B6B6B">ChatGPT</text>
      <line x1="650" y1="558" x2="740" y2="590" stroke="#B0B0B0" stroke-width="1"/>

      <rect x="760" y="558" width="90" height="32" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1"/>
      <text x="805" y="578" text-anchor="middle" font-size="10" fill="#6B6B6B">PDF</text>
      <line x1="760" y1="558" x2="850" y2="590" stroke="#B0B0B0" stroke-width="1"/>
    </g>

    <text x="880" y="650" text-anchor="middle" font-size="11" fill="#8A8A8A" font-style="italic">~ 15 s / frame · nothing else opened · 不打开任何其它工具</text>
  </g>
</svg>
