<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F1F1F"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#FAFAFA"/>

  <text x="60" y="60" font-size="22" font-weight="600" fill="#1F1F1F">The audit loop · 审查闭环</text>
  <text x="60" y="86" font-size="14" fill="#6B6B6B">Comment → trigger → audit → reply — all inside the same Figma thread</text>

  <!-- center label -->
  <circle cx="600" cy="400" r="92" fill="#F0EDE6" stroke="#1F1F1F" stroke-width="1.5"/>
  <text x="600" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#1F1F1F">Same</text>
  <text x="600" y="412" text-anchor="middle" font-size="14" font-weight="600" fill="#1F1F1F">comment thread</text>
  <text x="600" y="432" text-anchor="middle" font-size="12" fill="#6B6B6B">同一条评论线程</text>

  <!-- 4 nodes around center -->
  <!-- 1 Comment (top) -->
  <g transform="translate(460, 180)">
    <rect width="280" height="92" rx="10" fill="#FFFFFF" stroke="#1F1F1F" stroke-width="1.5"/>
    <text x="140" y="34" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1F">1 · Designer comments</text>
    <text x="140" y="58" text-anchor="middle" font-size="12" fill="#6B6B6B">"@ux focus on empty state"</text>
    <text x="140" y="78" text-anchor="middle" font-size="11" fill="#8A8A8A">设计师在画板上评论</text>
  </g>

  <!-- 2 Trigger (right) -->
  <g transform="translate(860, 354)">
    <rect width="280" height="92" rx="10" fill="#FFFFFF" stroke="#1F1F1F" stroke-width="1.5"/>
    <text x="140" y="34" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1F">2 · Trigger detected</text>
    <text x="140" y="58" text-anchor="middle" font-size="12" fill="#6B6B6B">skill introspects its needs</text>
    <text x="140" y="78" text-anchor="middle" font-size="11" fill="#8A8A8A">识别触发词 · 技能自省</text>
  </g>

  <!-- 3 Audit (bottom) -->
  <g transform="translate(460, 528)">
    <rect width="280" height="92" rx="10" fill="#FFFFFF" stroke="#1F1F1F" stroke-width="1.5"/>
    <text x="140" y="34" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1F">3 · AI audit runs</text>
    <text x="140" y="58" text-anchor="middle" font-size="12" fill="#6B6B6B">screenshot + node tree + rules</text>
    <text x="140" y="78" text-anchor="middle" font-size="11" fill="#8A8A8A">AI 审查</text>
  </g>

  <!-- 4 Reply (left) -->
  <g transform="translate(60, 354)">
    <rect width="280" height="92" rx="10" fill="#FFFFFF" stroke="#1F1F1F" stroke-width="1.5"/>
    <text x="140" y="34" text-anchor="middle" font-size="13" font-weight="600" fill="#1F1F1F">4 · Reply inline</text>
    <text x="140" y="58" text-anchor="middle" font-size="12" fill="#6B6B6B">findings + severity + fix</text>
    <text x="140" y="78" text-anchor="middle" font-size="11" fill="#8A8A8A">就地回复</text>
  </g>

  <!-- arrows clockwise -->
  <path d="M 740 226 C 880 226, 940 300, 890 360" fill="none" stroke="#1F1F1F" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 1000 446 C 1000 560, 820 600, 740 580" fill="none" stroke="#1F1F1F" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 460 580 C 300 600, 200 530, 200 446" fill="none" stroke="#1F1F1F" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 200 354 C 200 260, 320 226, 460 226" fill="none" stroke="#1F1F1F" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="60" y="670" font-size="11" fill="#8A8A8A" font-style="italic">Zero context switch — the entire loop stays in Figma.  零上下文切换 · 整个闭环留在 Figma 里。</text>
</svg>
